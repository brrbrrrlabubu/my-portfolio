<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Elena's Portfolio</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            /* Сделаем градиент поярче, чтобы его было видно */
            background: linear-gradient(45deg, #f4f1ea, #d8e2dc, #ffe5d9);
            background-size: 400% 400%;
            animation: gradientAnimation 10s ease infinite;
            color: #5d5d5d;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card { 
            background: #ffffff; 
            padding: 40px; 
            border-radius: 30px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 2px solid #e0d8c3;
            text-align: center;
            max-width: 400px;
            transition: transform 0.3s ease;
        }

        .card:hover { transform: scale(1.02); }

        h1 { color: #8c9a8e; font-size: 24px; }
        .skills { font-weight: bold; color: #a68b7c; }
        
        .tag {
            background: #e9ecef;
            padding: 5px 10px;
            border-radius: 10px;
            font-size: 14px;
            margin: 5px;
            display: inline-block;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 15px;
            background-color: #8c9a8e;
            color: white;
            cursor: pointer;
            font-family: inherit;
        }
        button:hover { background-color: #7a8a7c; }
    </style>
</head>
<body>
    <div class="card" id="mainCard">
        <h1>Привет, я 🌿травка^_^</h1>
        <p>Студентка IT, изучаю программирование и создаю интересные проекты (ещкерее).</p>
        <hr style="border: 0; border-top: 1px dashed #e0d8c3; margin: 20px 0;">
        <div class="skills">Мои технологии:</div>
        <div class="tag">Java</div>
        <div class="tag">SQL</div>
        <div class="tag">HTML/CSS</div>
        <div class="tag">JavaScript</div>
        <br>
        <button onclick="changeStyle()">✨ Магия</button>
        <p style="font-size: 12px; margin-top: 20px;">Проект создан для практики в колледже</p>
    </div>

    <script>
        function changeStyle() {
            const card = document.getElementById('mainCard');
            const colors = ['#fff5f5', '#f5fff5', '#f5f5ff', '#ffffff'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            card.style.backgroundColor = randomColor;
            alert('Стиль карточки изменен! JS работает 🚀');
        }
    </script>
</body>
</html>
