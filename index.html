<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Elena's Portfolio</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f1ea;
            color: #5d5d5d;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card { 
            background: #ffffff; 
            padding: 40px; 
            border-radius: 30px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 2px solid #e0d8c3;
            text-align: center;
            max-width: 400px;
        }
        h1 { color: #8c9a8e; font-size: 24px; }
        .skills { font-weight: bold; color: #a68b7c; }
        .tag {
            background: #e9ecef;
            padding: 5px 10px;
            border-radius: 10px;
            font-size: 14px;
            margin: 5px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Привет, я 🌿травка</h1>
        <p>Студентк IT, изучаю программирование и создаю интересные проекты(ещкерее).</p>
        <hr style="border: 0; border-top: 1px dashed #e0d8c3; margin: 20px 0;">
        <div class="skills">Мои технологии:</div>
        <div class="tag">Java</div>
        <div class="tag">SQL Server</div>
        <div class="tag">HTML/CSS</div>
        <div class="tag">JavaScript</div>
        <p style="font-size: 12px; margin-top: 20px;">Проект создан для практики в колледже</p>
    </div>
</body>
</html>
